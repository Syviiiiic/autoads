<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Auto Ads - Добавить объявление</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="app">
        <header class="header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h1>Продажа автомобиля</h1>
        </header>

        <form id="adForm" class="ad-form">
            <div class="form-group">
                <label>Марка *</label>
                <input type="text" id="brand" required placeholder="Например: Toyota">
            </div>

            <div class="form-group">
                <label>Модель *</label>
                <input type="text" id="model" required placeholder="Например: Camry">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Год выпуска *</label>
                    <input type="number" id="year" required min="1900" max="2026" placeholder="2020">
                </div>
                <div class="form-group">
                    <label>Цена *</label>
                    <input type="number" id="price" required placeholder="₽">
                </div>
            </div>

            <div class="form-group">
                <label>Пробег (км)</label>
                <input type="number" id="mileage" placeholder="0">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Тип двигателя</label>
                    <select id="engineType">
                        <option value="Бензин">Бензин</option>
                        <option value="Дизель">Дизель</option>
                        <option value="Электро">Электро</option>
                        <option value="Гибрид">Гибрид</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Объём (л)</label>
                    <input type="number" id="engineCapacity" step="0.1" placeholder="2.0">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Коробка передач</label>
                    <select id="transmission">
                        <option value="Механика">Механика</option>
                        <option value="Автомат">Автомат</option>
                        <option value="Робот">Робот</option>
                        <option value="Вариатор">Вариатор</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Привод</label>
                    <select id="drive">
                        <option value="Передний">Передний</option>
                        <option value="Задний">Задний</option>
                        <option value="Полный">Полный</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Цвет</label>
                <input type="text" id="color" placeholder="Белый, чёрный, синий...">
            </div>

            <div class="form-group">
                <label>Фотографии</label>
                <div class="photo-upload" id="photoUpload">
                    <input type="file" id="photoInput" accept="image/*" multiple>
                    <div class="photo-preview" id="photoPreview"></div>
                </div>
                <small>Можно загрузить до 10 фотографий. Первое фото будет обложкой.</small>
            </div>

            <div class="form-group">
                <label>Описание</label>
                <textarea id="description" rows="5" placeholder="Состояние, комплектация, особенности, история обслуживания..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Опубликовать объявление</button>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script src="js/add-ad.js"></script>
</body>
</html>
