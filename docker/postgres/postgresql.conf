-- /docker/postgres/postgresql.conf (монтировать в контейнер)
shared_buffers = 1GB                    -- 25% от RAM (4GB)
effective_cache_size = 3GB              -- 75% от RAM
maintenance_work_mem = 256MB            -- Для VACUUM и индексов
work_mem = 32MB                         -- Для сортировки и хешей
max_connections = 200                   -- Максимум подключений
max_worker_processes = 4                -- Параллельные процессы
max_parallel_workers = 4                -- Параллельные воркеры
max_parallel_workers_per_gather = 2     -- На запрос
random_page_cost = 1.1                  -- Для SSD
effective_io_concurrency = 200          -- Для SSD
wal_buffers = 16MB
checkpoint_completion_target = 0.9
min_wal_size = 1GB
max_wal_size = 4GB
default_statistics_target = 100
