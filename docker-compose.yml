version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: auto_ads_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-autobot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-autobot123}
      POSTGRES_DB: ${DB_NAME:-auto_ads}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c maintenance_work_mem=256MB
      -c work_mem=32MB
      -c max_connections=200
      -c max_worker_processes=4
      -c max_parallel_workers=4
      -c max_parallel_workers_per_gather=2
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
      - ./backups:/backups
    networks:
      - auto_ads_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-autobot} -d ${DB_NAME:-auto_ads}"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1.5'
          memory: 2G

  redis:
    image: redis:7-alpine
    container_name: auto_ads_redis
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - auto_ads_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 256M

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: auto_ads_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-autobot}:${DB_PASSWORD:-autobot123}@postgres:5432/${DB_NAME:-auto_ads}
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: ${BOT_TOKEN}
      WEB_CONCURRENCY: 4
      WORKERS_PER_CORE: 2
      MAX_WORKERS: 8
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./api:/app/api
      - ./database:/app/database
      - ./logs:/app/logs
    networks:
      - auto_ads_network
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop --http httptools
      "
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  mini-app:
    build:
      context: .
      dockerfile: Dockerfile.mini-app
    container_name: auto_ads_mini_app
    ports:
      - "80:80"
    volumes:
      - ./mini-app:/usr/share/nginx/html:ro
      - ./nginx/mini-app.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - auto_ads_network
    restart: unless-stopped
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  bot:
    build: .
    container_name: auto_ads_bot
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-autobot}:${DB_PASSWORD:-autobot123}@postgres:5432/${DB_NAME:-auto_ads}
      API_URL: http://api:8000
      MINI_APP_URL: ${MINI_APP_URL}
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_IDS: ${ADMIN_IDS}
    volumes:
      - ./logs:/app/logs
      - ./bot:/app/bot
      - ./database:/app/database
    networks:
      - auto_ads_network
    restart: unless-stopped
    command: python -m bot.main
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Опционально: pgAdmin для управления БД
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: auto_ads_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - auto_ads_network
    restart: unless-stopped
    depends_on:
      - postgres
    profiles:
      - debug
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  auto_ads_network:
    driver: bridge

volumes:
  postgres_data:
    name: auto_ads_postgres_data
  redis_data:
    name: auto_ads_redis_data
  pgadmin_data:
    name: auto_ads_pgadmin_data
