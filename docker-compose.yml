services:
  postgres:
    image: postgres:15-alpine
    container_name: auto_ads_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-autobot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-autobot123}
      POSTGRES_DB: ${DB_NAME:-auto_ads}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - auto_ads_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-autobot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auto_ads_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - auto_ads_network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: auto_ads_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-autobot}:${DB_PASSWORD:-autobot123}@postgres:5432/${DB_NAME:-auto_ads}
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: ${BOT_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./api:/app/api
      - ./database:/app/database
      - ./logs:/app/logs
    networks:
      - auto_ads_network
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  mini-app:
    build:
      context: .
      dockerfile: Dockerfile.mini-app
    container_name: auto_ads_mini_app
    ports:
      - "80:80"
    volumes:
      - ./mini-app:/usr/share/nginx/html:ro
      - ./nginx/mini-app.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - auto_ads_network
    restart: unless-stopped
    depends_on:
      - api

  bot:
    build: .
    container_name: auto_ads_bot
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-autobot}:${DB_PASSWORD:-autobot123}@postgres:5432/${DB_NAME:-auto_ads}
      API_URL: http://api:8000
      MINI_APP_URL: ${MINI_APP_URL}
      BOT_TOKEN: ${BOT_TOKEN}
    volumes:
      - ./logs:/app/logs
      - ./bot:/app/bot
      - ./database:/app/database
    networks:
      - auto_ads_network
    restart: unless-stopped
    command: python -m bot.main

networks:
  auto_ads_network:
    driver: bridge

volumes:
  postgres_data:
    name: auto_ads_postgres_data
  redis_data:
    name: auto_ads_redis_data
